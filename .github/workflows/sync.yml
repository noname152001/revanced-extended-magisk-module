name: Sync Fork

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_AUTH }}

      - name: Sync upstream & clean files
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git remote add upstream https://github.com/j-hc/revanced-magisk-module.git
          git fetch upstream refs/heads/main:refs/remotes/upstream/main
          git merge -X theirs upstream/main || true
          git checkout origin/main -- config.toml README.md || true
          git rm -rf --ignore-unmatch module/ ksu_profile/ CONFIG.md build-termux.sh .github/ISSUE_TEMPLATE/ || true

      - name: Inject custom code
        run: |
          cat << 'EOF' > patch.py
          import os
          import re

          def replace_in_file(filepath, old_text, new_text):
              if os.path.exists(filepath):
                  with open(filepath, "r") as f: content = f.read()
                  if old_text not in content:
                      print(f"[WARNING] This part not found {filepath} : '{old_text[:30]}...'")
                  with open(filepath, "w") as f: f.write(content.replace(old_text, new_text))

          def regex_replace(filepath, pattern, new_text):
              if os.path.exists(filepath):
                  with open(filepath, "r") as f: content = f.read()
                  new_content, count = re.subn(pattern, new_text, content, flags=re.DOTALL)
                  if count == 0:
                      print(f"[ATTENTION] La regex n'a rien trouvé dans {filepath}. Le code source a peut-être changé.")
                  with open(filepath, "w") as f: f.write(new_content)

          replace_in_file("build.sh", 'DEF_PATCHES_SRC="ReVanced/revanced-patches"', 'DEF_PATCHES_SRC="MorpheApp/morphe-patches"')
          replace_in_file("build.sh", 'DEF_CLI_SRC="ReVanced/revanced-cli"', 'DEF_CLI_SRC="MorpheApp/morphe-cli"')
          replace_in_file("build.sh", 'DEF_RV_BRAND="ReVanced"', 'DEF_RV_BRAND="Morphe"')
          
          old_block = r"""log "\nInstall [Microg](https://github.com/ReVanced/GmsCore/releases) for non-root YouTube and YT Music APKs"
          log "Use [zygisk-detach](https://github.com/j-hc/zygisk-detach) to detach YouTube and YT Music modules from Play Store"
          log "\n[revanced-magisk-module](https://github.com/j-hc/revanced-magisk-module)\n"
          log "$(cat "$TEMP_DIR"/*/changelog.md)"""

          new_block = r"""log "$(cat "$TEMP_DIR"/*/changelog.md)"

          # -- This part is generated by AI --
          AUTH_HEADER=(${GITHUB_TOKEN:+-H "Authorization: Bearer $GITHUB_TOKEN"})
          API_URL="https://api.github.com/repos/$DEF_PATCHES_SRC/releases/$([ "$DEF_PATCHES_VER" = "latest" ] && echo "latest" || echo "tags/$DEF_PATCHES_VER")"
          UPSTREAM_NOTES=$(curl -s "${AUTH_HEADER[@]}" "$API_URL" | jq -r '.body // "*No release notes found on the upstream repository.*"')
          log "\n$UPSTREAM_NOTES\n"
          # ----------------------------------"""

          replace_in_file("build.sh", old_block, new_block)
          regex_replace("build.sh", r"mkdir -p \$\{MODULE_TEMPLATE_DIR\}/bin/arm64.*?cmpr-x86_64\"", r"")
          regex_replace("build.sh", r"ENABLE_MODULE_UPDATE=\$\(toml_get.*?ENABLE_MODULE_UPDATE=false\nfi", r"")

          replace_in_file(".github/workflows/build.yml", 'Build modules/APKs', 'Build modules/Morphe')
          replace_in_file(".github/workflows/build.yml", 'release_name: ReVanced', 'release_name: Morphe')

          regex_replace(".github/workflows/build.yml", r"\s*- name: Report to Telegram.*?(?=\n\s*- name: |\Z)", r"")
          regex_replace(".github/workflows/build.yml", r"\s*- name: Update changelog and update json.*?(?=\n\s*- name: |\Z)", r"")

          replace_in_file(".github/workflows/ci.yml", '- cron: "0 16 * * *"', '- cron: "0 */1 * * *"')
          regex_replace(".github/workflows/ci.yml",
                        r"if ! git checkout origin/update build\.md; then.*?fi\n\s*fi",
                        r"""gh release view -R $GITHUB_REPOSITORY --json body -q .body > build.md 2>/dev/null || > build.md
                    if [ ! -s build.md ]; then
                      echo "first time building!"
                      echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
                    else
                      UPDATE_CFG=$(./build.sh config.toml --config-update)
                      if [ "$UPDATE_CFG" ]; then
                        echo "'$UPDATE_CFG'"
                        echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
                      else
                        echo "SHOULD_BUILD=0" >> $GITHUB_OUTPUT
                      fi
                    fi""")

          replace_in_file("utils.sh", 'build_mode_arr=(apk module)', 'build_mode_arr=(apk)')
          replace_in_file("utils.sh", 'build_mode_arr=(module)', 'build_mode_arr=(apk)')
          regex_replace("utils.sh", r"module_config\(\) \{.*?module_prop\(\) \{.*?\n\}", r"")

          EOF
          
          python3 patch.py
          rm patch.py

      - name: Commit and push
        run: |
          git add -A
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "chore: apply custom patches"
          fi
          
          if [[ $(git rev-parse HEAD) != $(git rev-parse origin/main) ]]; then
            git push origin main
            echo "Updates successfully synchronized and dispatched."
          else
            echo "No changes to commit, the repository is already up to date."
          fi
